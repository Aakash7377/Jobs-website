{% extends "base.html" %}
{% block title %}Apply for {{ job.title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h3 class="mb-2">Apply for {{ job.title }}</h3>
            <p class="text-muted mb-4">at {{ job.company.company_name }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Cover Letter (optional)</label>
                    {{ form.cover_letter.errors }}
                    {{ form.cover_letter }}
                </div>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
