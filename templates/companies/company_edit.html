{% extends "base.html" %}
{% block title %}Edit Company Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h3 class="mb-4">Edit Company Profile</h3>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field.errors }}
                        {{ field }}
                        {% if field.name == "logo" and form.instance.logo %}
                            <div class="mt-2">
                                <img src="{{ form.instance.logo.url }}" alt="Current logo" style="height:60px;">
                                <small class="text-muted d-block">Current logo</small>
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Update Company</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
