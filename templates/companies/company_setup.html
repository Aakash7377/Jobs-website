<!DOCTYPE html>
<html>
<head>
    <title>Company Setup</title>
</head>
<body>
    <h2>Complete Your Company Profile</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Company</button>
    </form>
</body>
</html>
